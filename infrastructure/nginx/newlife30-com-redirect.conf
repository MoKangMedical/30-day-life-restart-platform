# Activate after DNS A records for newlife30.com and www.newlife30.com point to 43.128.114.201.
# Then issue a certificate for both names before adding an HTTPS redirect server.
server {
    listen 80;
    listen [::]:80;
    server_name newlife30.com www.newlife30.com;

    return 301 https://newlife30.cn$request_uri;
}
