server {
    server_name newlife30.cn www.newlife30.cn;

    root /var/www/newlife30/current;
    index index.html;
    charset utf-8;

    access_log /var/log/nginx/newlife30.access.log;
    error_log /var/log/nginx/newlife30.error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 500;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:png|jpg|jpeg|gif|webp|mp3|pdf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/newlife30.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/newlife30.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    listen 80;
    listen [::]:80;
    server_name newlife30.cn www.newlife30.cn;
    return 301 https://newlife30.cn$request_uri;
}
